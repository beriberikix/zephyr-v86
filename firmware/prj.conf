# Console and UART configuration
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_0=y
CONFIG_CONSOLE=y
CONFIG_CONSOLE_HANDLER=y

# Input/Output streams
CONFIG_STDIN=y
CONFIG_STDOUT=y
CONFIG_STDERR=y

# Shell subsystem
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SYSTEM_SHELL=y

# Multiboot support for x86/qemu_x86
CONFIG_MULTIBOOT=y
CONFIG_OUTPUT_PRINT_MEMORY_USAGE=n

# Kernel binary name
CONFIG_KERNEL_BIN_NAME=zephyr.elf

# Optional: reduce build time
CONFIG_LOG=n
