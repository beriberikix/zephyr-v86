# Console and UART configuration
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_CONSOLE=y
CONFIG_CONSOLE_HANDLER=n
CONFIG_CONSOLE_SUBSYS=n

# Serial driver (poll-based for native sim)
CONFIG_UART_INTERRUPT_DRIVEN=n

# In Buildroot/v86 we may not have a working PTY device. Route UART0 through
# process stdin/stdout instead of creating /dev/pts entries.
CONFIG_UART_NATIVE_PTY_0_ON_STDINOUT=y

# Networking baseline for native_sim socket samples
CONFIG_NETWORKING=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_NET_NATIVE_OFFLOADED_SOCKETS=y
CONFIG_NET_DRIVERS=y
CONFIG_NET_TCP=y
CONFIG_NET_UDP=y
CONFIG_NET_IPV4=y
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_AUTO_INIT=n
CONFIG_NET_CONFIG_INIT_TIMEOUT=3

# In this runtime we prefer native_sim offloaded sockets over TAP/TUN.
CONFIG_ETH_NATIVE_TAP=n

# Offloaded sockets need heap backing for socket internals.
CONFIG_HEAP_MEM_POOL_SIZE=1024

# IPv6 DAD requires lower-level interface access not available with socket offload.
CONFIG_NET_IPV6_DAD=n

# Keep runtime output lightweight in the browser terminal
CONFIG_LOG=n
CONFIG_PRINTK=y

# Kernel/app sizing
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_KERNEL_BIN_NAME="zephyr"
