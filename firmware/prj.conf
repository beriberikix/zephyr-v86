# Console and UART configuration
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_CONSOLE=y
CONFIG_CONSOLE_HANDLER=n
CONFIG_CONSOLE_SUBSYS=n

# Serial driver (poll-based for native sim)
CONFIG_UART_INTERRUPT_DRIVEN=n

# In Buildroot/v86 we may not have a working PTY device. Route UART0 through
# process stdin/stdout instead of creating /dev/pts entries.
CONFIG_UART_NATIVE_PTY_0_ON_STDINOUT=y

# Shell subsystem disabled; app handles UART command parsing directly
CONFIG_SHELL=n

# Kernel binary name
CONFIG_KERNEL_BIN_NAME="zephyr"

# Optional: reduce build time
CONFIG_LOG=n
